<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MONSTER PICKER</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --green: #00ff41;
      --dark-green: #00cc33;
      --black: #060606;
      --panel: #0d0d0d;
      --border: #1a1a1a;
      --text: #e8e8e8;
      --muted: #555;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--black);
      color: var(--text);
      font-family: 'Barlow Condensed', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      cursor: crosshair;
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* Scanlines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .tagline {
      font-size: 0.9rem;
      letter-spacing: 0.4em;
      color: var(--green);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(4rem, 12vw, 8rem);
      line-height: 0.9;
      letter-spacing: 0.02em;
      color: #fff;
      text-shadow:
        0 0 40px rgba(0,255,65,0.3),
        0 0 80px rgba(0,255,65,0.1);
    }

    h1 span {
      color: var(--green);
      display: block;
    }

    .subtitle {
      font-size: 1rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 0.75rem;
    }

    /* Main layout */
    .main {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 3rem;
      align-items: center;
    }

    /* Wheel section */
    .wheel-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    .wheel-wrapper {
      position: relative;
      width: 580px;
      height: 580px;
      max-width: 90vw;
      max-height: 90vw;
    }

    /* Pointer/arrow at top */
    .pointer {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-top: 28px solid var(--green);
      z-index: 10;
      filter: drop-shadow(0 0 8px var(--green));
    }

    /* Outer glow ring */
    .wheel-wrapper::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: conic-gradient(var(--green), transparent, var(--green));
      z-index: -1;
      opacity: 0.5;
      animation: rotateRing 4s linear infinite;
    }

    @keyframes rotateRing {
      to { transform: rotate(360deg); }
    }

    canvas#wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      display: block;
    }

    /* Center hub */
    .hub {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 54px;
      height: 54px;
      background: var(--black);
      border: 3px solid var(--green);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--green);
      z-index: 10;
      box-shadow: 0 0 20px rgba(0,255,65,0.4);
    }

    /* Spin button */
    .spin-btn {
      position: relative;
      background: var(--green);
      color: var(--black);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      letter-spacing: 0.15em;
      border: none;
      padding: 1rem 4rem;
      cursor: pointer;
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
      transition: all 0.15s ease;
      text-transform: uppercase;
    }

    .spin-btn:hover {
      background: #fff;
      transform: scale(1.04);
      box-shadow: 0 0 30px rgba(0,255,65,0.5);
    }

    .spin-btn:active { transform: scale(0.97); }
    .spin-btn:disabled {
      background: var(--muted);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Result panel */
    .result-panel {
      min-width: 220px;
      max-width: 260px;
    }

    .result-label {
      font-size: 0.75rem;
      letter-spacing: 0.4em;
      color: var(--green);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .result-box {
      background: var(--panel);
      border: 1px solid var(--border);
      border-left: 3px solid var(--green);
      padding: 1.5rem;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0.5rem;
      position: relative;
      overflow: hidden;
    }

    .result-box::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(0,255,65,0.03), transparent);
    }

    .result-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      line-height: 1;
      color: #fff;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .result-name.show {
      opacity: 1;
      transform: translateY(0);
    }

    .result-sub {
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      color: var(--green);
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.5s ease 0.3s;
    }

    .result-sub.show { opacity: 1; }

    /* Stats strip */
    .stats-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
      margin-top: 2rem;
      border: 1px solid var(--border);
    }

    .stat {
      background: var(--panel);
      padding: 1rem;
      text-align: center;
    }

    .stat-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      color: var(--green);
      display: block;
    }

    .stat-label {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 2.5rem 0;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider span {
      font-size: 0.7rem;
      letter-spacing: 0.4em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* Error */
    .error {
      color: #ff4444;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-align: center;
      display: none;
    }

    /* Flash effect on result */
    @keyframes flashGreen {
      0%, 100% { box-shadow: none; }
      50% { box-shadow: 0 0 40px rgba(0,255,65,0.4), inset 0 0 20px rgba(0,255,65,0.05); }
    }

    .result-box.flash {
      animation: flashGreen 0.6s ease;
    }

    /* Responsive */
    @media (max-width: 680px) {
      .main {
        grid-template-columns: 1fr;
        gap: 2rem;
      }
      .result-panel {
        max-width: 100%;
        width: 100%;
      }
      .wheel-wrapper {
        width: 340px;
        height: 340px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <p class="tagline">Gym Fuel Roulette</p>
      <h1>MONSTER<span>PICKER</span></h1>
      <p class="subtitle">Spin. Fuel. Destroy.</p>
    </header>

    <div class="main">
      <div class="wheel-section">
        <div class="wheel-wrapper">
          <div class="pointer"></div>
          <canvas id="wheel"></canvas>
          <div class="hub">M</div>
        </div>
        <button class="spin-btn" id="spinBtn" onclick="spin()">SPIN IT</button>
        <p class="error" id="errorMsg">⚠ Could not connect to backend</p>
      </div>

      <div class="result-panel">
        <p class="result-label">Your Fuel Today</p>
        <div class="result-box" id="resultBox">
          <div class="result-name" id="resultName">—</div>
          <div class="result-sub" id="resultSub">Hit spin to find out</div>
        </div>

        <div class="stats-strip">
          <div class="stat">
            <span class="stat-value" id="totalCount">—</span>
            <span class="stat-label">Flavors</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="spinCount">0</span>
            <span class="stat-label">Spins</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="lastResult">—</span>
            <span class="stat-label">Last Pick</span>
          </div>
        </div>
      </div>
    </div>

    <div class="divider"><span>Monster Energy Flavors</span></div>
  </div>

  <script>
   const API_BASE = 'https://pick-your-monster.up.railway.app/api';
    let flavors = [];
    let currentAngle = 0;
    let spinning = false;
    let spinCount = 0;
    let canvas, ctx;

    // Monster-themed color palette
    const colors = [
      '#00ff41', '#00cc33', '#009922', '#007711',
      '#00ee55', '#33ff66', '#22dd44', '#11bb33',
      '#00ff88', '#00dd77', '#00bb55', '#009944',
      '#55ff44', '#44ee33', '#33cc22', '#22aa11',
      '#00ffaa', '#00eebb', '#00ccdd', '#00aacc',
      '#00ff66', '#11ff55', '#22ff44', '#33ff33',
      '#00dd88', '#00cc77', '#00bb66', '#00aa55',
      '#44ffaa', '#33ee99', '#22dd88', '#11cc77',
      '#66ff44', '#55ee33', '#44dd22', '#33cc11',
    ];

    async function init() {
      canvas = document.getElementById('wheel');
      ctx = canvas.getContext('2d');

      // Fix blurry canvas text — scale by devicePixelRatio
      const dpr = window.devicePixelRatio || 1;
      const size = 580;
      canvas.width = size * dpr;
      canvas.height = size * dpr;
      canvas.style.width = size + 'px';
      canvas.style.height = size + 'px';
      ctx.scale(dpr, dpr);

      try {
        const res = await fetch(`${API_BASE}/flavors`);
        if (!res.ok) throw new Error('API error');
        flavors = await res.json();
        document.getElementById('totalCount').textContent = flavors.length;
        drawWheel(currentAngle);
      } catch (e) {
        document.getElementById('errorMsg').style.display = 'block';
        // Fallback demo flavors
        flavors = ['Original', 'Ultra White', 'Ultra Black', 'Mango Loco', 'Pipeline Punch'];
        document.getElementById('totalCount').textContent = flavors.length + '*';
        drawWheel(currentAngle);
      }
    }

    function drawWheel(rotation) {
      const size = 580;
      const cx = size / 2;
      const cy = size / 2;
      const radius = cx - 4;
      const arc = (2 * Math.PI) / flavors.length;

      ctx.clearRect(0, 0, size, size);

      flavors.forEach((flavor, i) => {
        const startAngle = rotation + i * arc;
        const endAngle = startAngle + arc;
        const color = colors[i % colors.length];

        // Segment fill
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, radius, startAngle, endAngle);
        ctx.closePath();

        // Alternate slightly darker shades
        ctx.fillStyle = i % 2 === 0 ? color : adjustColor(color, -30);
        ctx.fill();

        // Segment border
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // Label
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(startAngle + arc / 2);
        ctx.textAlign = 'right';
        ctx.fillStyle = '#000';
        ctx.font = `bold ${flavors.length > 25 ? 13 : 15}px 'Barlow Condensed', sans-serif`;
        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        ctx.shadowBlur = 2;

        const label = flavor.length > 16 ? flavor.substring(0, 15) + '…' : flavor;
        ctx.fillText(label, radius - 10, 4);
        ctx.restore();
      });

      // Center circle (will be covered by .hub div)
      ctx.beginPath();
      ctx.arc(cx, cy, 28, 0, 2 * Math.PI);
      ctx.fillStyle = '#060606';
      ctx.fill();
      ctx.strokeStyle = '#00ff41';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    function adjustColor(hex, amount) {
      const num = parseInt(hex.slice(1), 16);
      const r = Math.max(0, Math.min(255, (num >> 16) + amount));
      const g = Math.max(0, Math.min(255, ((num >> 8) & 0xff) + amount));
      const b = Math.max(0, Math.min(255, (num & 0xff) + amount));
      return `rgb(${r},${g},${b})`;
    }

    async function spin() {
      if (spinning || flavors.length === 0) return;
      spinning = true;

      const btn = document.getElementById('spinBtn');
      btn.disabled = true;
      btn.textContent = 'SPINNING...';

      // Hide previous result
      document.getElementById('resultName').classList.remove('show');
      document.getElementById('resultSub').classList.remove('show');

      let winner = '';
      try {
        const res = await fetch(`${API_BASE}/random`);
        if (!res.ok) throw new Error();
        winner = await res.text();
      } catch {
        winner = flavors[Math.floor(Math.random() * flavors.length)];
      }

      // Find winner index
      const winnerIndex = flavors.findIndex(f => f === winner);
      const targetIndex = winnerIndex >= 0 ? winnerIndex : 0;

      // Calculate target angle so winner lands at top (pointer)
      const arc = (2 * Math.PI) / flavors.length;
      const targetAngle = -(targetIndex * arc) - arc / 2 + (3 * Math.PI / 2) - (Math.PI / 2);
      const extraSpins = (5 + Math.floor(Math.random() * 4)) * 2 * Math.PI;
      const finalAngle = targetAngle + extraSpins;

      // Animate
      const duration = 5000;
      const start = performance.now();
      const startAngle = currentAngle;

      function animate(now) {
        const elapsed = now - start;
        const progress = Math.min(elapsed / duration, 1);

        // Ease out cubic
        const eased = 1 - Math.pow(1 - progress, 4);
        const angle = startAngle + (finalAngle - startAngle) * eased;

        drawWheel(angle);

        if (progress < 1) {
          requestAnimationFrame(animate);
        } else {
          currentAngle = angle % (2 * Math.PI);
          spinning = false;
          btn.disabled = false;
          btn.textContent = 'SPIN AGAIN';
          showResult(winner);
        }
      }

      requestAnimationFrame(animate);
    }

    function showResult(name) {
      spinCount++;
      document.getElementById('spinCount').textContent = spinCount;
      document.getElementById('lastResult').textContent = name.split(' ')[0];

      const nameEl = document.getElementById('resultName');
      const subEl = document.getElementById('resultSub');
      const box = document.getElementById('resultBox');

      nameEl.textContent = name;
      subEl.textContent = "Today's Fuel ⚡";

      setTimeout(() => {
        nameEl.classList.add('show');
        subEl.classList.add('show');
        box.classList.add('flash');
        setTimeout(() => box.classList.remove('flash'), 600);
      }, 100);
    }

    init();
  </script>
</body>
</html>
